name: Test on multiple Python versions

on:
  push:
    branches:
      - main
    paths:
      - 'routerl/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'tutorials/1_Quickstart_TraffficEnvironment_Introduction/**'
      - '.github/workflows/test_compatibility.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'routerl/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'tutorials/1_Quickstart_TraffficEnvironment_Introduction/**'
      - '.github/workflows/test_compatibility.yml'

  workflow_dispatch:

jobs:
  compatibility_test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SUMO
        run: |
          sudo apt-get update
          sudo apt-get install -y sumo sumo-tools sumo-doc
          echo "SUMO_HOME=/usr/share/sumo" >> $GITHUB_ENV

      - name: Verify SUMO installation
        run: |
          echo "SUMO_HOME is set to $SUMO_HOME"
          sumo --version
          command -v python
          python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter pytest nbval
          python -m pip install -r requirements.txt

      - name: Run quickstart compatibility tutorial
        run: |
          python -m pytest --nbval-lax tutorials/1_Quickstart_TraffficEnvironment_Introduction/main.ipynb --current-env
