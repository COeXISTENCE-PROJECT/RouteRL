name: Tutorials

on:
  push:
    branches:
      - main
    paths:
      - 'tutorials/**'
      - 'routerl/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'tests/test_plotter.py'
      - '.github/workflows/test_tutorials.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'tutorials/**'
      - 'routerl/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'tests/test_plotter.py'
      - '.github/workflows/test_tutorials.yml'

  workflow_dispatch:

jobs:
  test-tutorials:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      ROUTERL_TUTORIAL_CI: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Jupyter and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter pytest nbmake
          python -m pip install -r requirements.txt

      - name: Install SUMO
        run: |
          sudo apt-get update
          sudo apt-get install -y sumo sumo-tools sumo-doc
          echo "SUMO_HOME=/usr/share/sumo" >> $GITHUB_ENV

      - name: Verify SUMO installation
        run: |
          echo "SUMO_HOME is set to $SUMO_HOME"
          sumo --version
          command -v python
          python --version

      - name: Run tutorial tests
        run: |
          python -m pytest -q tests/test_plotter.py
          python -m pytest --nbmake --nbmake-timeout=2000 tutorials/1_Quickstart_TraffficEnvironment_Introduction
          python -m pytest --nbmake --nbmake-timeout=2000 tutorials/2_MediumNetwork_AVsBehaviors_TorchRL_CollaborativeAlgorithms
          python -m pytest --nbmake --nbmake-timeout=2000 tutorials/3_BiggerNetwork_IndependentAgents
        
